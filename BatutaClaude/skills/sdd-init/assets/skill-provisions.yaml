# skill-provisions.yaml — Tech-to-skill and tech-to-MCP mapping for Project Skill Provisioning
# Read by sdd-init Step 3.8. This is DATA, not code.
# Claude reads this file during /sdd-init to determine which skills and MCPs to provision.
#
# Categories:
#   always   — Provisioned in every Batuta project
#   sdd      — Provisioned when using the SDD pipeline (always in Batuta projects)
#   tech_rules — Conditionally provisioned based on detected technologies
#   mcp_rules  — MCP servers provisioned based on detected technologies

# --- Skills: Always provisioned ---
always:
  - scope-rule
  - ecosystem-creator
  - security-audit
  - team-orchestrator
  - ecosystem-lifecycle

# --- Skills: SDD pipeline (always in Batuta projects) ---
# v15: SDD simplified to 4 phases (explore, design, apply, verify)
# propose/spec/tasks/archive are no longer separate phases
sdd:
  - sdd-explore
  - sdd-design
  - sdd-apply
  - sdd-verify
  - prd-generator
  - tdd-workflow
  - debugging-systematic

# --- Skills: v15.1 meta additions (adapted from addyosmani/agent-skills, MIT) ---
# Provisioned in EVERY project — quality guardrails applicable cross-domain
v15_1_meta:
  - agent-hiring              # Contract-based agent delegation protocol
  - code-simplification       # Chesterton's Fence, Rule of 500
  - deprecation-and-migration # Code-as-liability, feature flag lifecycle
  - git-workflow-and-versioning # Trunk-based commits, Build Cop role

# --- Skills: Technology-detected ---
# Each rule has: detect (signals) + skills (to provision)
# Signal types:
#   files: file names to check for existence
#   content_pattern: regex to search in dependency files (requirements.txt, pyproject.toml, package.json, etc.)
#   project_type: match against sdd-init Step 1 project type detection
#   context_mentions: keywords that may appear in user conversation or project docs
tech_rules:
  # Python + FastAPI — triggers api-design (fastapi-crud and jwt-auth were archived in v15.0)
  - detect:
      files: [requirements.txt, pyproject.toml, setup.py, Pipfile]
      content_pattern: "fastapi|FastAPI"
    skills: [api-design]

  # SQLAlchemy / ORM (often paired with PostgreSQL)
  - detect:
      content_pattern: "sqlalchemy|SQLAlchemy|alembic"
    skills: [sqlalchemy-models]
    mcps: [postgres]

  # Prefect 3 self-hosted flows (v15.2 addition)
  - detect:
      content_pattern: "prefect>=3|prefect_3|from prefect import"
      files: [requirements.txt, pyproject.toml, prefect.yaml]
    skills: [prefect-flows]

  # Pydantic AI agent framework (v15.2 addition)
  - detect:
      content_pattern: "pydantic-ai|pydantic_ai|from pydantic_ai"
      files: [requirements.txt, pyproject.toml]
    skills: [pydantic-ai]

  # LLM / AI Agents
  - detect:
      content_pattern: "langchain|langgraph|openai|anthropic|google-adk|claude"
      project_type: ai-agent
    skills: [llm-pipeline-design]

  # ETL / Data Pipelines
  - detect:
      content_pattern: "temporalio|prefect|airflow|dagster|pandas|polars"
      project_type: data-pipeline
    skills: [data-pipeline-design]

  # Temporal / Workers / Docker deploy
  - detect:
      content_pattern: "temporalio|temporal"
      files: [temporal.yaml, docker-compose.yml, Dockerfile]
    skills: [worker-scaffold]

  # Colombia compliance
  - detect:
      context_mentions: [colombia, dian, nit, habeas data, ley 1581, retencion]
    skills: [compliance-colombia]

  # Complex processes (typically added by sdd-explore, not file detection)
  # Included here for completeness — sdd-explore Step 2.5 can also provision these
  - detect:
      context_mentions: [process complexity, multiple actors, 3+ case types]
    skills: [process-analyst]

  # External taxonomies / recursive categories
  - detect:
      context_mentions: [external categories, bank concepts, tax codes, SKU hierarchy]
    skills: [recursion-designer]

  # Playwright / E2E Testing
  - detect:
      files: [playwright.config.ts, playwright.config.js]
      content_pattern: "playwright"
    skills: [e2e-testing]
    mcps: [playwright]

  # ESLint / Code Quality
  # No dedicated skill — MCP provides lint integration for AI Pyramid Layer 1
  - detect:
      files: [eslint.config.js, eslint.config.mjs, .eslintrc.js, .eslintrc.json]
      content_pattern: "eslint"
    skills: []
    mcps: [eslint]

  # Semgrep / Security Scanning
  # SECURITY: Semgrep is global in settings.json, but this rule ensures the
  # security-audit skill is provisioned when semgrep config files exist.
  - detect:
      files: [.semgrep.yml, .semgrepignore, semgrep.yml]
      content_pattern: "semgrep"
    skills: [security-audit]
    mcps: [semgrep]

  # PostgreSQL / Database
  - detect:
      content_pattern: "postgres|postgresql|psycopg|pg_"
      files: [docker-compose.yml, docker-compose.yaml]
    skills: [sqlalchemy-models]
    mcps: [postgres]

  # React / Next.js
  - detect:
      files: [next.config.js, next.config.mjs, next.config.ts]
      content_pattern: "react|next|nextjs|@next"
    skills: [react-nextjs]
    mcps: []

  # TypeScript / Node.js
  - detect:
      files: [tsconfig.json, tsconfig.base.json]
      content_pattern: "typescript|ts-node"
    skills: [typescript-node]
    mcps: [eslint]

  # CI/CD Pipelines
  - detect:
      files: [.github/workflows, .gitlab-ci.yml, Jenkinsfile, .circleci]
      content_pattern: "github/workflows|gitlab-ci|jenkins|circleci"
    skills: [ci-cd-pipeline]

  # API Design (OpenAPI / Swagger)
  - detect:
      files: [openapi.yaml, openapi.json, swagger.yaml, swagger.json]
      content_pattern: "openapi|swagger"
    skills: [api-design]

  # Observability Stack (monitoring, tracing, error tracking)
  - detect:
      content_pattern: "opentelemetry|sentry-sdk|@sentry|langfuse|prometheus|datadog"
    skills: [observability]
    mcps: [semgrep]

  # Vector Databases / RAG
  - detect:
      content_pattern: "pgvector|pinecone|chromadb|langchain.*embeddings|llama.index"
    skills: [vector-db-rag]
    mcps: [postgres]

  # Message Brokers / Queues
  - detect:
      files: [docker-compose.yml, docker-compose.yaml]
      content_pattern: "pika|aio-pika|rabbitmq|amqplib|celery|bullmq|kafkajs|confluent.kafka"
    skills: [message-queues]

  # Claude Agent SDK
  - detect:
      content_pattern: "claude.agent.sdk|claude-agent-sdk|@anthropic-ai/claude-agent-sdk|claude_agent_sdk"
    skills: [claude-agent-sdk]

# --- MCP Servers ---
# Each rule has: detect (signals) + mcp (server config)
# Config values with YOUR_*_HERE are placeholders the user must fill in.
#
# MCP tiers:
#   always   — Present in every project (global settings.json + .mcp.json)
#   detected — Provisioned when technology signals match
mcp_rules:
  # Always include — these are in global settings.json AND project .mcp.json
  always:
    context7:
      type: http
      url: "https://mcp.context7.com/mcp"
    # SECURITY: Semgrep scans AI-generated code for vulnerabilities, secrets,
    # and supply chain risks. Global because security applies to every project.
    semgrep:
      type: stdio
      command: uvx
      args: ["semgrep-mcp"]
    # REASONING: Sequential thinking for complex architectural decisions.
    # Supports CTO Strategy Layer and SDD pipeline exploration phases.
    sequential-thinking:
      type: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
    # BUSINESS RULE: Notion is Batuta's enterprise KB and CRM — always available.
    # Used at interaction 0 (client/project context), sdd-explore Step 2.8 (approach research),
    # sdd-archive Step 5.5 (KB + Proyectos persistence), and Stop hook Step 2 (CHECKPOINT→KB).
    # DB IDs: Clientes=4930495b, Proyectos=7ad4e5bf, KB=58433974.
    # User must replace YOUR_NOTION_TOKEN_HERE with actual Notion integration token.
    notion:
      type: stdio
      command: npx
      args: ["-y", "@notionhq/notion-mcp-server"]
      env:
        OPENAPI_MCP_HEADERS: '{"Authorization": "Bearer YOUR_NOTION_TOKEN_HERE", "Notion-Version": "2022-06-28"}'

  # GitHub — if project is a git repository
  - detect:
      files: [.git]
    mcp:
      name: github
      type: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-github"]
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN: "YOUR_TOKEN_HERE"

  # PostgreSQL — if postgres detected in docker-compose or dependencies
  # BUSINESS RULE: Uses official MCP package for read-only schema inspection.
  # Batuta core stack — most projects use PostgreSQL.
  - detect:
      content_pattern: "postgres|postgresql|psycopg"
      files: [docker-compose.yml, docker-compose.yaml]
    mcp:
      name: postgres
      type: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-postgres"]
      env:
        DATABASE_URI: "YOUR_DATABASE_URI_HERE"

  # Playwright — if E2E testing configured
  # AI Validation Pyramid Layer 3 (E2E testing). Maps to e2e-testing skill.
  - detect:
      files: [playwright.config.ts, playwright.config.js]
      content_pattern: "playwright"
    mcp:
      name: playwright
      type: stdio
      command: npx
      args: ["-y", "@playwright/mcp@latest"]

  # ESLint — if linting configured
  # AI Validation Pyramid Layer 1 (static analysis / code quality).
  - detect:
      files: [eslint.config.js, eslint.config.mjs, eslint.config.cjs, .eslintrc.js, .eslintrc.json, .eslintrc.yml]
      content_pattern: "eslint"
    mcp:
      name: eslint
      type: stdio
      command: npx
      args: ["-y", "@eslint/mcp@latest"]

  # Coolify — if deployment platform detected
  - detect:
      files: [coolify.json, .coolify]
      content_pattern: "coolify"
    mcp:
      name: coolify
      type: stdio
      command: npx
      args: ["-y", "@masonator/coolify-mcp"]
      env:
        COOLIFY_ACCESS_TOKEN: "YOUR_TOKEN_HERE"
        COOLIFY_BASE_URL: "YOUR_COOLIFY_URL_HERE"

  # n8n — if automation platform detected
  - detect:
      files: [n8n-*.json]
      project_type: automation
    mcp:
      name: n8n-mcp
      type: stdio
      command: supergateway
      args: ["--streamableHttp", "YOUR_N8N_MCP_URL_HERE"]

# --- Agents: Always provisioned ---
# Scope agents (hub machinery) + quality-agent (universal)
# These agents are copied to .claude/agents/ in every Batuta project.
always_agents:
  - pipeline-agent
  - infra-agent
  - observability-agent
  - quality-agent

# --- Agents: Technology-detected ---
# Domain agents provisioned based on project tech stack.
# Detection logic mirrors tech_rules: file signals, content patterns, project types.
agent_rules:
  # Backend frameworks — any server-side framework triggers backend-agent
  - detect:
      content_pattern: "fastapi|django|express|nestjs|gin|fiber|flask|spring"
      project_type: webapp
    agents: [backend-agent]
    # WHY: expertise_domains enables sdd-explore Step 2.5.5 to detect gaps and
    # sdd-apply Step 0.75 to resolve "domain: backend-api" → backend-agent dynamically
    # without hardcoding agent names in tasks.md.
    expertise_domains: [backend-api, rest-endpoints, orm, auth-flows, db-schema, migrations]

  # Data / AI / ML — data processing or AI frameworks trigger data-agent
  - detect:
      content_pattern: "pandas|temporalio|langchain|langgraph|anthropic|openai|google-adk|polars|dagster"
      project_type: [ai-agent, data-pipeline]
    agents: [data-agent]
    expertise_domains: [etl-pipeline, llm-classification, rag, embeddings, data-transformation, vector-db]

  # Testing / Quality — any project benefits from quality-agent for test strategy
  - detect:
      content_pattern: "pytest|jest|playwright|vitest|unittest|cypress|mocha|jasmine"
      project_type: any
    agents: [quality-agent]
    expertise_domains: [testing, debugging, security-audit, e2e, code-review, tdd]
