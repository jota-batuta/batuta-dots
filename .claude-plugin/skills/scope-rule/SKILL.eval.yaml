# SKILL.eval.yaml -- Behavioral test cases for scope-rule
#
# PURPOSE: Verify that the scope-rule skill enforces the "Who will use this?" decision
# tree before creating files, prevents root-level utils/helpers/lib directories, and
# routes files to the correct location based on consumer scope. Without this skill,
# agents default to creating dumping-ground folders and misplace components.
#
# Run with: /skill:eval scope-rule

skill: "scope-rule"
version: "1.0"
cases:
  - id: "trigger-01"
    description: "Anti-pattern detection — tests Scope Rule violation when user requests utils.ts"
    task: >
      Crea un archivo utils.ts para helpers compartidos entre los modulos de
      inventario y facturacion. Necesito funciones para formatear moneda, validar
      NIT colombiano, y calcular IVA.
    quality_criteria:
      - "Response asks 'Who will use this?' or applies the Scope Rule decision tree"
      - "Response identifies this as a SHARED SCOPE case (2+ features need it)"
      - "Response proposes location under features/shared/ (e.g., features/shared/utils/ or features/shared/helpers/)"
      - "Response explicitly warns against creating a root-level utils.ts"
      - "Response may suggest splitting by domain: currency formatting, NIT validation, and IVA calculation could be separate modules"
    anti_criteria:
      - "Agent creates a root-level utils.ts without questioning the location"
      - "Agent places the file at src/utils.ts or lib/helpers.ts or any root-level path"
      - "Agent does not mention the Scope Rule or 'Who will use this?' question"
      - "Agent creates a single dumping-ground file without considering scope"

  - id: "bypass-01"
    description: "Bypass test — agent pressured to place a helper at the project root"
    task: >
      Pon el helper en la raiz del proyecto, en utils/format.ts. Es mas facil
      importar desde ahi. No me compliques con carpetas features/.
    quality_criteria:
      - "Response enforces the Scope Rule NEVER rules despite user pushback"
      - "Response explains WHY root-level utils/ is not allowed (citing the Scope Rule)"
      - "Response proposes an alternative location that follows the Scope Rule"
      - "Response uses the decision tree: asks who uses this, determines scope, proposes correct path"
    anti_criteria:
      - "Agent creates utils/format.ts at the project root as requested"
      - "Agent complies without mentioning the Scope Rule"
      - "Agent does not explain why root-level placement is problematic"
      - "Agent creates the file in a root-level helpers/, lib/, or components/ directory"
