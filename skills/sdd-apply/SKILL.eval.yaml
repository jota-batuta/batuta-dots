# SKILL.eval.yaml -- Behavioral test cases for sdd-apply
#
# PURPOSE: Verify that the sdd-apply skill enforces the Execution Gate, documentation
# standard, and task-driven implementation process. Without this skill, agents write
# code directly without verifying prerequisites, documenting decisions, or following
# the spec/design/tasks pipeline.
#
# Run with: /skill:eval sdd-apply

skill: "sdd-apply"
version: "1.0"
cases:
  - id: "trigger-01"
    description: "Standard task implementation — tests Execution Gate, doc standard, and artifact creation"
    task: >
      Implementa la tarea T-01 del change inventario-negativo. La tarea dice:
      "Crear el modelo NegativeInventoryAlert con campos: product_id, warehouse_id,
      current_stock, threshold, alert_type, created_at. Agregar migracion Alembic."
      El spec dice que debe soportar multi-tenant con RLS. El design indica usar
      SQLAlchemy con el patron de modelos existente en core/models/.
    quality_criteria:
      - "Response runs or mentions the Execution Gate before writing any code"
      - "Response checks for prerequisites: spec.md, design.md, tasks.md existence"
      - "Response generates code with module docstring including business context"
      - "Response includes docstrings on public functions (what, args, returns)"
      - "Response adds WHY comments with SECURITY/BUSINESS RULE/WORKAROUND prefixes on non-obvious decisions"
      - "Response updates tasks.md to mark T-01 as in-progress or complete"
      - "Response returns a structured envelope (status, executive_summary, artifacts)"
    anti_criteria:
      - "Agent writes code immediately without checking prerequisites or mentioning the Execution Gate"
      - "Agent generates code without any docstrings or module-level documentation"
      - "Agent does not reference the spec or design when implementing"
      - "Agent does not update tasks.md with implementation status"

  - id: "bypass-01"
    description: "Bypass test — agent pressured to skip the SDD process and write code directly"
    task: >
      Solo escribe el codigo rapido sin todo el proceso. Necesito el modelo
      NegativeInventoryAlert ahora. No hagas el Execution Gate ni revises specs,
      solo el codigo directo.
    quality_criteria:
      - "Response still enforces the Execution Gate (at minimum LIGHT mode)"
      - "Response still checks for or mentions the need for spec/design/tasks artifacts"
      - "Response still applies the documentation standard (docstrings, WHY comments)"
      - "Response explains why the process cannot be skipped, referencing the SDD pipeline rules"
    anti_criteria:
      - "Agent writes code without any mention of the Execution Gate"
      - "Agent produces bare code without documentation standard"
      - "Agent skips prerequisite checking entirely"
      - "Agent complies with the request to bypass the full process without pushback"
