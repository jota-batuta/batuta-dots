# SKILL.eval.yaml -- Behavioral test cases for ecosystem-creator
#
# PURPOSE: Verify that the ecosystem-creator skill correctly guides the agent through
# component creation (skills, sub-agents, workflows) with proper structure, frontmatter,
# registration, and classification. Without this skill, agents create ad-hoc files
# missing conventions, frontmatter fields, and registration steps.
#
# Run with: /skill:eval ecosystem-creator

skill: "ecosystem-creator"
version: "1.0"
cases:
  - id: "trigger-01"
    description: "Skill creation request — tests decision tree, frontmatter generation, and scope decision"
    task: >
      Necesito crear un skill para Redis cache. Quiero que el agente sepa las
      mejores practicas de caching con Redis, cuando usar TTL vs eviction policies,
      y como integrar con nuestra app de TypeScript.
    quality_criteria:
      - "Response classifies the request as a SKILL (not agent, sub-agent, or workflow)"
      - "Response asks or determines scope: project-specific vs global"
      - "Response generates or proposes a SKILL.md with YAML frontmatter including name, description starting with 'Use when', license, metadata (author, version, created, scope, auto_invoke, platforms), and allowed-tools"
      - "Response follows the naming convention: technology skill pattern (e.g., redis-cache)"
      - "Response mentions the Registration Checklist or registration steps"
    anti_criteria:
      - "Agent creates a plain markdown file without YAML frontmatter"
      - "Agent skips the decision tree and jumps directly to writing content"
      - "Agent does not mention registration or where the skill file should be placed"
      - "Agent creates a description field that summarizes the workflow instead of listing trigger conditions"

  - id: "bypass-01"
    description: "Bypass test — agent pressured to skip the full creation process"
    task: >
      Pon un SKILL.md rapido para Redis, no necesito todo el proceso formal.
      Solo escribe el archivo directo.
    quality_criteria:
      - "Response still follows the ecosystem-creator process despite the pressure"
      - "Response includes proper YAML frontmatter with all required fields"
      - "Response addresses scope decision (project-specific vs global)"
      - "Response mentions or performs the Registration Checklist"
    anti_criteria:
      - "Agent writes a bare SKILL.md without frontmatter or with incomplete frontmatter"
      - "Agent skips the scope decision entirely"
      - "Agent does not mention registration at all"
      - "Agent produces a generic markdown file that does not follow the skill template"

  - id: "trigger-02"
    description: "Sub-agent creation — tests correct type classification and envelope contract"
    task: >
      Create a sub-agent for database migrations. It should handle schema changes
      safely for our PostgreSQL multi-tenant setup, verify RLS policies after
      migration, and report results back to the pipeline.
    quality_criteria:
      - "Response classifies the request as a SUB-AGENT (not a skill or agent)"
      - "Response generates a SKILL.md that includes the Envelope Contract section with status, executive_summary, artifacts, next_recommended, risks"
      - "Response includes 'What You Receive' and 'Execution and Persistence Contract' sections"
      - "Response follows sub-agent naming convention (e.g., sdd-migrate)"
      - "Response mentions artifact_store.mode handling"
    anti_criteria:
      - "Agent creates a plain skill file without the envelope contract"
      - "Agent classifies this as a regular skill instead of a sub-agent"
      - "Agent omits the orchestrator communication contract (input/output)"
      - "Agent creates an agent definition (JSON) instead of a sub-agent skill (SKILL.md)"
